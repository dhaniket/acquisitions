services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    depends_on:
      neon-local:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

  neon-local:
    image: neondatabase/neon_local:latest
    ports:
      - "5432:5432"
    env_file:
      - .env.development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neon -d neondb"]
      interval: 5s
      timeout: 5s
      retries: 10
